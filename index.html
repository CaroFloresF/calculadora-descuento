<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Descuento</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<meta charset="UTF-8">
<title>Calculadora de Descuento</title>
<style>
body{
    font-family: Arial;
    background:#f4f4f4;
    padding:20px;
    margin:0;
}
.container{
    background:white;
    padding:20px;
    width:90%;
    max-width:400px;
    margin:auto;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,.2);


.input-rojo{
    width:100%;
    padding:12px;
    border:1px solid red;
    border-radius:8px;
    color: #ff3b30;
    min-height:70px;
    resize:none;
    font-size:16px;
    font-family: inherit;
    resize: none;
    background-color:#fff;
    box-sizing:border-box;
}
.input-rojo::placeholder{
    color:#ff3b30;
    opacity: 1;

}
}
input,select,button{
    width:100%;
    padding:8px;
    margin:5px 0;
}
.resultado{
    margin-top:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<h2>Calculadora de Descuento</h2>

<input type="number" id="precio" placeholder="Precio normal">
<textarea 
id="descuentoPOS"
class="input-rojo"
placeholder="Valor de descuento POS
(lo que sale en rojo en el POS)"
rows="2"
></textarea>

<select id="opcion">
    <option value="1">Ingresar % descuento a respetar </option>
    <option value="2">Ingresar precio a respetar valor credivoucher </option>
</select>

<input type="number" id="dato" placeholder="Valor según opción (% o precio final)">

<button onclick="calcular()">Calcular</button>

<div class="resultado" id="resultado"></div>
</div>

<script>
function calcular(){

    let precioNormal = parseFloat(document.getElementById("precio").value);
    let descuentoPOS = parseFloat(document.getElementById("descuentoPOS").value);
    let opcion = document.getElementById("opcion").value;
    let dato = parseFloat(document.getElementById("dato").value);

    if(isNaN(precioNormal) || isNaN(descuentoPOS) || isNaN(dato)){
        alert("Complete todos los campos");
        return;
    }

    let porcentajePOS = descuentoPOS/precioNormal*100;
    let descuentoRestante = 100 - porcentajePOS;
    let precioBase;

    if(opcion == 1){
        // % final
        let valorFinal = precioNormal*((100-dato)/100);
        precioBase = valorFinal/(descuentoRestante/100);
    }
    else{
        // precio final
        precioBase = dato/(descuentoRestante/100);
    }

    document.getElementById("resultado").innerHTML =
    "Debes marcar el producto a: $"+precioBase.toFixed(2);
}
</script>

</body>
</html>
